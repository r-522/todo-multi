<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToDo</title>
<style>
  html,body{height:100%}
  body{background:#008080;font:13px "MS Sans Serif",Tahoma,Geneva,sans-serif;color:#000;margin:0;padding:18px}
  .win{background:#c0c0c0;border:1px solid #000;padding:3px;max-width:620px;margin:0 auto 18px;
    box-shadow:inset -1px -1px #808080,inset 1px 1px #dfdfdf,inset -2px -2px #404040,inset 2px 2px #fff}
  .title{background:#000080;color:#fff;font-weight:bold;padding:4px 7px;display:flex;align-items:center;justify-content:space-between}
  .title .b{display:inline-block;min-width:18px;height:15px;margin-left:3px;padding:0 2px;background:#c0c0c0;border:1px solid #000;
    color:#000;font-weight:bold;text-align:center;line-height:13px;box-shadow:inset -1px -1px #808080,inset 1px 1px #fff;cursor:pointer}
  .menu{padding:3px 8px;border-bottom:1px solid #808080}
  .menu span{margin-right:14px}
  .menu u{text-decoration:underline}
  .body{padding:12px}
  .sunken{background:#fff;border:1px solid #808080;box-shadow:inset -1px -1px #fff,inset 1px 1px #404040}
  button{font:13px "MS Sans Serif",Tahoma,sans-serif;background:#c0c0c0;border:1px solid #000;padding:3px 12px;cursor:pointer;
    box-shadow:inset -1px -1px #808080,inset 1px 1px #fff}
  button:active{box-shadow:inset 1px 1px #808080,inset -1px -1px #fff}
  button:disabled{color:#808080}
  input[type=text]{font:13px "MS Sans Serif",Tahoma,sans-serif;border:1px solid #808080;background:#fff;padding:4px;
    box-shadow:inset 1px 1px #404040;flex:1;min-width:0}
  ul.todos{list-style:none;margin:0;padding:6px;min-height:150px;max-height:46vh;overflow:auto}
  ul.todos li{display:flex;align-items:center;gap:8px;padding:3px 2px}
  ul.todos li .t{flex:1;word-break:break-word}
  ul.todos li.done .t{text-decoration:line-through;color:#808080}
  ul.todos li button{padding:1px 8px}
  .empty{color:#808080;padding:10px}
  .addrow{display:flex;gap:8px;margin-top:10px}
  .toolbar{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
  .status{margin-top:10px;padding:5px 8px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .status b{font-weight:bold}
  pre.src{font:12px "Courier New",monospace;white-space:pre;overflow:auto;max-height:60vh;margin:0;padding:10px;line-height:1.45}
  .hidden{display:none}
</style>
</head>
<body>

<div class="win">
  <div class="title">
    <span class="name">ToDo - <span id="svc"></span></span>
    <span><span class="b">_</span><span class="b">[ ]</span><span class="b">x</span></span>
  </div>
  <div class="menu"><span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span><u>H</u>elp</span></div>
  <div class="body">
    <ul class="todos sunken" id="list"></ul>
    <div class="addrow">
      <input type="text" id="newtitle" placeholder="新しいタスクを入力..." autocomplete="off">
      <button id="add">追加</button>
    </div>
    <div class="status sunken">
      <span>DB connect: <b id="t_conn">--</b> ms &nbsp;|&nbsp; INSERT: <b id="t_ins">--</b> ms</span>
      <span>件数: <b id="count">0</b></span>
    </div>
    <div class="toolbar">
      <button id="viewsrc">ソースを表示</button>
      <button id="reload">再読込</button>
    </div>
  </div>
</div>

<div class="win hidden" id="srcwin">
  <div class="title">
    <span class="name">source - <span class="svc2"></span></span>
    <span><span class="b" id="srcclose">x</span></span>
  </div>
  <div class="body"><pre class="src sunken" id="srcbody">読み込み中...</pre></div>
</div>

<script>
  // この 1 行だけが各サービスで異なる
  const SVC = "Python (Flask)";

  const $ = function (id) { return document.getElementById(id); };
  const API = "/api/todos";
  $("svc").textContent = SVC;
  document.querySelector(".svc2").textContent = SVC;
  document.title = "ToDo - " + SVC;

  function render(todos) {
    const ul = $("list");
    ul.innerHTML = "";
    if (!todos.length) {
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = "(タスクはありません)";
      ul.appendChild(li);
    }
    todos.forEach(function (t) {
      const li = document.createElement("li");
      if (t.completed) li.className = "done";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!t.completed;
      cb.onchange = function () { toggle(t.id, cb.checked); };
      const sp = document.createElement("span");
      sp.className = "t";
      sp.textContent = t.title;
      const del = document.createElement("button");
      del.textContent = "削除";
      del.onclick = function () { remove(t.id); };
      li.appendChild(cb); li.appendChild(sp); li.appendChild(del);
      ul.appendChild(li);
    });
    $("count").textContent = todos.length;
  }

  function load() {
    fetch(API).then(function (r) { return r.json(); }).then(render)
      .catch(function (e) { $("list").innerHTML = '<li class="empty">読み込みエラー: ' + e + '</li>'; });
  }

  function add() {
    const inp = $("newtitle");
    const title = inp.value.trim();
    if (!title) return;
    $("add").disabled = true;
    fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: title })
    }).then(function (r) { return r.json(); }).then(function (data) {
      if (data.timings) {
        $("t_conn").textContent = Number(data.timings.db_connect_ms).toFixed(2);
        $("t_ins").textContent = Number(data.timings.insert_ms).toFixed(2);
      }
      inp.value = "";
      $("add").disabled = false;
      inp.focus();
      load();
    }).catch(function (e) { $("add").disabled = false; alert("追加に失敗: " + e); });
  }

  function toggle(id, completed) {
    fetch(API + "/" + id, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ completed: completed })
    }).then(load);
  }

  function remove(id) {
    fetch(API + "/" + id, { method: "DELETE" }).then(load);
  }

  function viewSource() {
    $("srcwin").classList.remove("hidden");
    $("srcbody").textContent = "読み込み中...";
    fetch("/source").then(function (r) { return r.text(); })
      .then(function (txt) { $("srcbody").textContent = txt; })
      .catch(function (e) { $("srcbody").textContent = "ソース取得エラー: " + e; });
  }

  $("add").onclick = add;
  $("newtitle").addEventListener("keydown", function (e) { if (e.key === "Enter") add(); });
  $("viewsrc").onclick = viewSource;
  $("reload").onclick = load;
  $("srcclose").onclick = function () { $("srcwin").classList.add("hidden"); };
  load();
</script>

</body>
</html>
